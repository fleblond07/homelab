---
- name: Install log rotation package
  ansible.builtin.apt:
    name: logrotate
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure persistent journal directory exists
  ansible.builtin.file:
    path: /var/log/journal
    state: directory
    owner: root
    group: systemd-journal
    mode: "2755"

- name: Ensure journald drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure persistent journald logs
  ansible.builtin.template:
    src: journald-homelab.conf.j2
    dest: /etc/systemd/journald.conf.d/99-homelab.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-journald

- name: Configure log rotation defaults
  ansible.builtin.template:
    src: logrotate.conf.j2
    dest: /etc/logrotate.conf
    owner: root
    group: root
    mode: "0644"
