---
docker_admin_user: homelab_admin

docker_prerequisite_packages:
  - ca-certificates
  - curl
  - gnupg

docker_apt_key_url: https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg
docker_apt_key_path: /etc/apt/keyrings/docker.asc
docker_apt_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armhf
docker_apt_arch: "{{ docker_apt_arch_map.get(ansible_facts['architecture'], ansible_facts['architecture']) }}"
docker_apt_repository: >-
  deb [arch={{ docker_apt_arch }}
  signed-by={{ docker_apt_key_path }}]
  https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
  {{ ansible_facts['distribution_release'] }} stable

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_package_state: present
docker_package_hold: true

docker_daemon_config:
  log-driver: json-file
  log-opts:
    max-size: 10m
    max-file: "3"

docker_systemd_override_dir: /etc/systemd/system/docker.service.d
docker_systemd_override_path: "{{ docker_systemd_override_dir }}/10-local-unix-socket.conf"
