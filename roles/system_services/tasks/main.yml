---
- name: Disable unused services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop: "{{ unused_services }}"
  register: unused_services_result
  failed_when: >-
    unused_services_result is failed and
    "Could not find the requested service" not in (unused_services_result.msg | default(""))

